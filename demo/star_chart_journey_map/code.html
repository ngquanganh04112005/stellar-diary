<style>
        body {
            background-color: #121414;
            color: #e2e2e2;
            overflow-x: hidden;
        }
        
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(114, 17, 153, 0.05) 0%, transparent 50%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
        }

        .node-glow {
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .path-line {
            stroke-dasharray: 10;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        
        /* Webkit Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.3); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.5); 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen relative pb-32">
<!-- The Void (Background) -->
<div class="starfield">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="100" id="stars" patternunits="userSpaceOnUse" width="100" x="0" y="0">
<circle cx="10" cy="10" fill="rgba(255,255,255,0.8)" r="1"></circle>
<circle cx="40" cy="80" fill="rgba(255,255,255,0.4)" r="0.5"></circle>
<circle cx="80" cy="30" fill="rgba(255,255,255,0.6)" r="1.5"></circle>
<circle cx="60" cy="60" fill="rgba(0,229,255,0.5)" r="1"></circle>
</pattern>
</defs>
<rect fill="url(#stars)" height="100%" width="100%" x="0" y="0"></rect>
</svg>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 backdrop-blur-xl bg-white/5 border-b border-white/10 shadow-[0_0_15px_rgba(0,229,255,0.2)]">
<div class="flex items-center gap-4 hover:opacity-80 transition-opacity">
<div class="w-10 h-10 rounded-full overflow-hidden border border-primary-fixed-dim/30">
<img alt="Astronaut profile picture" class="w-full h-full object-cover" data-alt="A close-up portrait of an astronaut wearing a highly detailed, futuristic white space suit helmet with a reflective visor. The visor reflects a breathtaking nebula with deep purples and vibrant electric blues. The lighting is dramatic and cinematic, suggesting the edge of the universe. The overall aesthetic is visionary and hyper-realistic, fitting a modern sci-fi UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhQebhe-Jah58bs0szQu8weaZJVm_1HZ1vsSaq3YglNJSOVqAvuKD6i62H4W4Xft666NJA1AZ5PwTP2BUHU8XZP81ruYhEiIWRYDcxoxPbDvTgGavTv7UugXF1-aCdMcQ5ITfFVadPcft8GlHdUbX6Cs540jLkozQKVAUIu5VNvYRzwiXbStEFc0j1hegZV-bvdh6vGV6jWzK83zlaNetHmExSfHbWTm1EOFu-xH8M7M_36UUvQtL8KyxSNaxUvXACKWpK1_2TSdLD"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary-fixed-dim tracking-widest uppercase">MISSION CONTROL</h1>
</div>
<button class="text-primary-fixed-dim hover:opacity-80 transition-opacity hover:scale-95 duration-200">
<span class="material-symbols-outlined text-[28px]" data-icon="rocket_launch">rocket_launch</span>
</button>
</header>
<!-- Main Canvas -->
<main class="pt-28 px-container-padding max-w-7xl mx-auto flex flex-col gap-stack-lg">
<!-- Current Mission Status -->
<section class="glass-panel rounded-xl p-6 relative overflow-hidden flex flex-col md:flex-row gap-6 items-center">
<div class="absolute -right-20 -top-20 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="flex-1 space-y-4 relative z-10">
<div class="inline-block px-3 py-1 rounded-full bg-primary-container/10 border border-primary-container/30">
<span class="font-label-caps text-label-caps text-primary-container">CURRENT DESTINATION</span>
</div>
<h2 class="font-display-lg-mobile md:font-display-lg text-primary">Lunar Gateway</h2>
<p class="font-body-md text-on-surface-variant max-w-md">
                    Distance to next node: 384,400 km. Maintain daily log sequence to power propulsion systems.
                </p>
<div class="flex items-center gap-4 mt-6">
<button class="bg-gradient-to-r from-primary-container/80 to-primary/80 text-on-primary font-label-caps text-label-caps px-6 py-3 rounded-lg shadow-[0_0_15px_rgba(0,229,255,0.4)] hover:shadow-[0_0_25px_rgba(0,229,255,0.6)] transition-all">
                        INITIATE LOG
                    </button>
<button class="border border-primary-container text-primary-container font-label-caps text-label-caps px-6 py-3 rounded-lg hover:bg-primary-container/10 transition-colors">
                        SCAN SECTOR
                    </button>
</div>
</div>
<!-- Mini Progress Ring -->
<div class="relative w-40 h-40 shrink-0 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="rgba(255,255,255,0.1)" stroke-width="2"></circle>
<circle class="drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]" cx="50" cy="50" fill="none" r="45" stroke="#00e5ff" stroke-dasharray="283" stroke-dashoffset="100" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="font-stats-number text-stats-number text-primary">64%</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-[10px]">TRAVELED</span>
</div>
</div>
</section>
<!-- Star Map Visualization -->
<section class="relative h-[500px] w-full rounded-xl overflow-hidden glass-panel">
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<!-- Connections -->
<path class="path-line" d="M 100 400 Q 250 350 400 250 T 700 150" fill="none" stroke="rgba(0,229,255,0.3)" stroke-width="2"></path>
<!-- Earth (Origin) -->
<g transform="translate(100, 400)">
<circle class="node-glow" fill="#00daf3" r="12"></circle>
<circle fill="none" opacity="0.5" r="24" stroke="#00daf3" stroke-width="1"></circle>
<text class="font-label-caps text-[10px]" fill="#bac9cc" text-anchor="middle" y="30">EARTH</text>
</g>
<!-- Moon (Next/Active) -->
<g transform="translate(400, 250)">
<circle class="node-glow drop-shadow-[0_0_15px_rgba(0,229,255,1)]" fill="#c3f5ff" r="16">
<animate attributename="r" dur="3s" repeatcount="indefinite" values="14;18;14"></animate>
</circle>
<circle fill="none" opacity="0.8" r="32" stroke="#c3f5ff" stroke-dasharray="4 4" stroke-width="1.5">
<animatetransform attributename="transform" dur="10s" from="0" repeatcount="indefinite" to="360" type="rotate"></animatetransform>
</circle>
<text class="font-label-caps text-[12px] font-bold" fill="#00e5ff" text-anchor="middle" y="40">LUNAR GATEWAY</text>
</g>
<!-- Mars (Locked) -->
<g transform="translate(700, 150)">
<circle fill="#333535" r="10" stroke="#849396" stroke-width="1"></circle>
<text class="font-label-caps text-[10px]" fill="#59585e" text-anchor="middle" y="25">MARS</text>
<g transform="translate(-6, -6)">
<path d="M6 4V3C6 1.34315 4.65685 0 3 0C1.34315 0 0 1.34315 0 3V4H0V10H6V4H6ZM1 4V3C1 1.89543 1.89543 1 3 1C4.10457 1 5 1.89543 5 3V4H1Z" fill="#849396"></path>
</g>
</g>
</svg>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 pt-4 backdrop-blur-[40px] bg-white/5 border-t border-white/10 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] rounded-t-xl md:hidden">
<a class="flex flex-col items-center justify-center text-primary-container drop-shadow-[0_0_8px_rgba(0,229,255,0.6)] font-bold scale-110 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map" data-weight="fill" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-caps text-[10px] tracking-widest">JOURNEY</span>
</a>
<a class="flex flex-col items-center justify-center text-outline-variant opacity-60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-label-caps text-[10px] tracking-widest">JOURNAL</span>
</a>
<a class="flex flex-col items-center justify-center text-outline-variant opacity-60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-caps text-[10px] tracking-widest">HOME</span>
</a>
<a class="flex flex-col items-center justify-center text-outline-variant opacity-60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="query_stats">query_stats</span>
<span class="font-label-caps text-[10px] tracking-widest">STATS</span>
</a>
<a class="flex flex-col items-center justify-center text-outline-variant opacity-60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-caps text-[10px] tracking-widest">PROFILE</span>
</a>
</nav>
<!-- Web Nav Cluster (Hidden on Mobile) -->
<div class="hidden md:flex fixed top-4 right-20 items-center gap-6 z-50 bg-black/20 backdrop-blur-md px-6 py-2 rounded-full border border-white/10">
<a class="text-primary-container font-label-caps text-[12px] font-bold drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]" href="#">JOURNEY</a>
<a class="text-outline-variant hover:text-primary transition-colors font-label-caps text-[12px]" href="#">JOURNAL</a>
<a class="text-outline-variant hover:text-primary transition-colors font-label-caps text-[12px]" href="#">HOME</a>
<a class="text-outline-variant hover:text-primary transition-colors font-label-caps text-[12px]" href="#">STATS</a>
<a class="text-outline-variant hover:text-primary transition-colors font-label-caps text-[12px]" href="#">PROFILE</a>
</div>
</body></html>
